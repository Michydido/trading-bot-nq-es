name: Aggiorna calendario news

on:
  schedule:
    - cron: '5 0 * * *'
  workflow_dispatch:

jobs:
  update-news:
    runs-on: ubuntu-latest
    permissions:
      contents: write          # <-- Questa riga dà i permessi di scrittura

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Esegui script di aggiornamento
        run: python update_news.py
        env:
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Aggiornamento automatico news.csv [skip ci]"
          file_pattern: news.csv
  env:
    FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true